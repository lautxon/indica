<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Músico - Indica</title>
  
  <!-- Estilos base para evitar pantalla negra -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      color: #333333;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #root {
      min-height: 100vh;
    }
  </style>
  
  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
  <div id="root"></div>
  
  <!-- Configuración del CMS -->
  <script>
    // Esperar a que el CMS esté disponible
    window.onload = function() {
      if (window.CMS) {
        CMS.init({
          config: {
            backend: {
              name: 'github',
              repo: 'lautxon/indica',
              branch: 'main'
            },
            site_url: 'https://lautxon.github.io/indica/',
            display_url: 'https://lautxon.github.io/indica/',
            media_folder: 'public/images/uploads',
            public_folder: '/indica/images/uploads',
            collections: [{
              name: 'canciones',
              label: '🎵 Canciones',
              folder: 'src/content/canciones',
              create: true,
              slug: '{{slug}}',
              fields: [
                { label: 'Título', name: 'title', widget: 'string' },
                { label: 'Portada', name: 'image', widget: 'image' },
                { label: 'Link (Spotify/YouTube)', name: 'audio_url', widget: 'string' },
                { label: 'Fecha', name: 'date', widget: 'datetime' },
                { label: 'Descripción', name: 'body', widget: 'markdown' }
              ]
            }]
          }
        });
      }
    };
  </script>
</body>
</html>
