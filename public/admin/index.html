<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Músico - Indica</title>
  
  <!-- Estilos base para evitar pantalla negra -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      color: #333333;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #root {
      min-height: 100vh;
    }
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-size: 1.25rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">Cargando panel...</div>
  </div>
  
  <!-- Decap CMS: se auto-inicializa con config.yml -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
