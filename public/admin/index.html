<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Músico - Indica</title>
  <!-- CSP en UNA sola línea (sin saltos que rompan el parseo) -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net https://api.github.com; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; connect-src 'self' https://api.github.com https://unpkg.com https://lautxon.github.io;">
  <style>
    body { margin: 0; padding: 0; background: #fff; color: #333; font-family: system-ui, sans-serif; }
    #root { min-height: 100vh; }
    .loading { display: flex; justify-content: center; align-items: center; min-height: 100vh; font-size: 1.25rem; color: #666; }
  </style>
  <script>window.CMS_MANUAL_INIT = true;</script>
</head>
<body>
  <div id="root"><div class="loading">Iniciando panel...</div></div>
  <!-- ⭐ Decap CMS v2.x (más compatible con GitHub Pages) -->
  <script src="https://unpkg.com/decap-cms@^2.0.0/dist/decap-cms.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.CMS) {
        CMS.init({
          config: {
            backend: {
              name: 'github',
              repo: 'lautxon/indica',
              branch: 'main'
            },
            site_url: 'https://lautxon.github.io/indica/',
            display_url: 'https://lautxon.github.io/indica/',
            media_folder: 'public/images/uploads',
            public_folder: '/indica/images/uploads',
            load_config_file: false,
            collections: [{
              name: 'canciones',
              label: '🎵 Canciones',
              folder: 'src/content/canciones',
              create: true,
              slug: '{{slug}}',
              fields: [
                { label: 'Título', name: 'title', widget: 'string' },
                { label: 'Portada', name: 'image', widget: 'image' },
                { label: 'Link (Spotify/YouTube)', name: 'audio_url', widget: 'string' },
                { label: 'Fecha', name: 'date', widget: 'datetime' },
                { label: 'Descripción', name: 'body', widget: 'markdown' }
              ]
            }]
          }
        });
      }
    });
  </script>
</body>
</html>
